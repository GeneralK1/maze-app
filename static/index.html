<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер Лабиринт</title>
    <style>
        :root {
            --primary: #0077FF;
            --primary-hover: #005FCC;
            --success: #10B981;
            --error: #EF4444;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at top left, #E0F2FE 0%, var(--bg) 40%); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; line-height: 1.5; }
        .container { width: 100%; max-width: 800px; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), #3B82F6, #60A5FA); }
        header { text-align: center; margin-bottom: 28px; }
        header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        header p { color: var(--text-muted); font-size: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 14px; font-weight: 500; color: var(--text-main); }
        .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; background: #FAFAFA; transition: var(--transition); outline: none; }
        .field input:focus, .field select:focus { border-color: var(--primary); background: #FFF; box-shadow: 0 0 0 3px rgba(0, 119, 255, 0.15); }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { flex: 1; min-width: 140px; padding: 12px 16px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--success); color: white; display: none; }
        .btn-secondary:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn.loading .spinner { display: block; }
        .btn.loading span { opacity: 0.8; }
        #status { margin-top: 16px; text-align: center; min-height: 24px; font-weight: 500; font-size: 14px; padding: 8px; border-radius: 6px; transition: var(--transition); opacity: 0; }
        #status.visible { opacity: 1; }
        #status.success { background: #D1FAE5; color: #065F46; }
        #status.error { background: #FEE2E2; color: #991B1B; }
        #status.info { background: #DBEAFE; color: #1E40AF; }
        .preview-wrapper { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .preview-header h3 { font-size: 18px; font-weight: 600; }
        .preview-img-container { background: #F1F5F9; border-radius: 10px; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 200px; position: relative; }
        #preview-img { max-width: 100%; height: auto; border-radius: 6px; box-shadow: var(--shadow); }
        footer { margin-top: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
        @media (max-width: 600px) { body { padding: 16px; } .card { padding: 20px; } .form-grid { grid-template-columns: 1fr; } header h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                <h1>🌀 Мастер Лабиринт</h1>
                <p>Профессиональная генерация карт для спортивного ориентирования</p>
            </header>

            <div class="form-grid">
                <div class="field">
                    <label for="w">Ширина лабиринта (м)</label>
                    <input type="number" id="w" value="20" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="h">Высота лабиринта (м)</label>
                    <input type="number" id="h" value="20" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="cp">Количество КП</label>
                    <input type="number" id="cp" value="15" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="courses">Кол-во дистанций</label>
                    <input type="number" id="courses" value="3" min="1" max="10" step="1">
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                    <label for="format">Формат печати</label>
                    <select id="format">
                        <option value="A5">A5 (стандарт, компактный)</option>
                        <option value="A4">A4 (увеличенный, детальный)</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button id="btn-preview" class="btn btn-primary" onclick="showPreview()">
                    <div class="spinner"></div><span>🔍 Предпросмотр</span>
                </button>
                <button id="btn-download" class="btn btn-secondary" onclick="downloadZip()">
                    <div class="spinner"></div><span>📥 Скачать ZIP</span>
                </button>
            </div>

            <div id="status"></div>

            <div class="preview-wrapper" id="preview-container">
                <div class="preview-header">
                    <h3>🖼️ Мастер-карта</h3>
                    <span style="color: var(--text-muted); font-size: 14px;">Нажмите "Скачать", чтобы получить полный комплект PDF</span>
                </div>
                <div class="preview-img-container">
                    <img id="preview-img" alt="Предпросмотр карты">
                </div>
            </div>
        </div>

        <footer>
            Создано для спортивного ориентирования &bull; <a href="https://master-maze-app.ru" target="_blank">master-maze-app.ru</a>
        </footer>
    </div>

    <script>
        let currentToken = null;
        function setStatus(msg, type = 'info') { const el = document.getElementById('status'); el.textContent = msg; el.className = `visible ${type}`; }
        function setLoading(btnId, isLoading) { const btn = document.getElementById(btnId); if (isLoading) { btn.classList.add('loading'); btn.disabled = true; } else { btn.classList.remove('loading'); btn.disabled = false; } }
        async function showPreview() {
            setLoading('btn-preview', true); document.getElementById('btn-download').style.display = 'none'; document.getElementById('preview-container').style.display = 'none'; setStatus('⏳ Генерация карты...', 'info'); currentToken = null;
            try {
                const payload = { w: +document.getElementById('w').value, h: +document.getElementById('h').value, cp: +document.getElementById('cp').value, format: document.getElementById('format').value };
                const res = await fetch('/preview', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) { document.getElementById('preview-img').src = data.image; document.getElementById('preview-container').style.display = 'block'; document.getElementById('btn-download').style.display = 'block'; currentToken = data.token; setStatus('✅ Карта готова к просмотру', 'success'); } else { setStatus('❌ ' + (data.error || 'Ошибка генерации'), 'error'); }
            } catch (e) { setStatus('❌ Ошибка соединения', 'error'); } finally { setLoading('btn-preview', false); }
        }
        async function downloadZip() {
            if (!currentToken) { setStatus('❌ Сначала создайте предпросмотр', 'error'); return; }
            setLoading('btn-download', true); setStatus('⏳ Подготовка архива...', 'info');
            try {
                const payload = { w: +document.getElementById('w').value, h: +document.getElementById('h').value, cp: +document.getElementById('cp').value, courses: +document.getElementById('courses').value, format: document.getElementById('format').value, token: currentToken };
                const res = await fetch('/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(res.statusText);
                const blob = await res.blob(); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `Maze_${document.getElementById('format').value}_${payload.w}x${payload.h}.zip`; document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(url); setStatus('✅ Скачивание началось!', 'success');
            } catch (e) { setStatus('❌ Ошибка скачивания', 'error'); } finally { setLoading('btn-download', false); }
        }
    </script>
</body>
</html>
