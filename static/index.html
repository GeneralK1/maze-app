<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0077FF">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер Лабиринт</title>
    <style>
        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --success: #10B981;
            --success-hover: #059669;
            --bg: #0F172A;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-solid: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: rgba(148, 163, 184, 0.15);
            --radius: 16px;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #312E81 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Анимированные частицы на фоне */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366F1, #8B5CF6, #EC4899);
            animation: shimmer 3s infinite linear;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px -5px var(--primary-glow);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #CBD5E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field input, .field select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            transition: var(--transition);
            outline: none;
            font-family: inherit;
        }

        .field input:hover, .field select:hover {
            border-color: rgba(99, 102, 241, 0.4);
        }

        .field input:focus, .field select:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .field input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .field select option {
            background: var(--bg-card-solid);
            color: var(--text-main);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 160px;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px; height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            color: white;
            box-shadow: 0 4px 15px -3px var(--primary-glow);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-hover), #6D28D9);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--primary-glow);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            display: none;
            box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--success-hover), #047857);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading .spinner { display: block; }
        .btn.loading span { opacity: 0.8; }

        #status {
            margin-top: 20px;
            text-align: center;
            min-height: 24px;
            font-weight: 500;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            transition: var(--transition);
            opacity: 0;
            backdrop-filter: blur(10px);
        }

        #status.visible { opacity: 1; }
        #status.success { background: rgba(16, 185, 129, 0.15); color: #34D399; border: 1px solid rgba(16, 185, 129, 0.2); }
        #status.error { background: rgba(239, 68, 68, 0.15); color: #F87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        #status.info { background: rgba(99, 102, 241, 0.15); color: #818CF8; border: 1px solid rgba(99, 102, 241, 0.2); }

        .preview-wrapper {
            margin-top: 32px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preview-header h3 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-header span {
            color: var(--text-muted);
            font-size: 14px;
        }

        .preview-img-container {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 240px;
            position: relative;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .preview-img-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(99, 102, 241, 0.03) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(99, 102, 241, 0.03) 50%, transparent 52%);
            background-size: 20px 20px;
            pointer-events: none;
        }

        #preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            position: relative;
        }

        footer a::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: var(--primary);
            transition: width 0.3s;
        }

        footer a:hover::after { width: 100%; }

        /* Адаптивность */
        @media (max-width: 600px) {
            body { padding: 16px; }
            .card { padding: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 26px; }
            .btn { min-width: 100%; }
            .preview-header { flex-direction: column; align-items: flex-start; }
        }

        /* Полоса прокрутки */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                <div class="logo-icon">🌀</div>
                <h1>Мастер Лабиринт</h1>
                <p>Профессиональная генерация карт для спортивного ориентирования</p>
            </header>

            <div class="form-grid">
                <div class="field">
                    <label for="w">Ширина лабиринта (м)</label>
                    <input type="number" id="w" value="20" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="h">Высота лабиринта (м)</label>
                    <input type="number" id="h" value="20" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="cp">Количество КП</label>
                    <input type="number" id="cp" value="15" min="5" max="50" step="1">
                </div>
                <div class="field">
                    <label for="courses">Кол-во дистанций</label>
                    <input type="number" id="courses" value="3" min="1" max="10" step="1">
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                    <label for="format">Формат печати</label>
                    <select id="format">
                        <option value="A5">A5 (стандарт, компактный)</option>
                        <option value="A4">A4 (увеличенный, детальный)</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button id="btn-preview" class="btn btn-primary" onclick="showPreview()">
                    <div class="spinner"></div><span>🔍 Предпросмотр</span>
                </button>
                <button id="btn-download" class="btn btn-secondary" onclick="downloadZip()">
                    <div class="spinner"></div><span>📥 Скачать ZIP</span>
                </button>
            </div>

            <div id="status"></div>

            <div class="preview-wrapper" id="preview-container">
                <div class="preview-header">
                    <h3>🖼️ Мастер-карта</h3>
                    <span>Нажмите «Скачать», чтобы получить полный комплект PDF</span>
                </div>
                <div class="preview-img-container">
                    <img id="preview-img" alt="Предпросмотр карты">
                </div>
            </div>
        </div>

        <footer>
            Создано для спортивного ориентирования &bull; <a href="https://master-maze-app.ru" target="_blank">master-maze-app.ru</a>
        </footer>
    </div>

    <script>
        let currentToken = null;

        function setStatus(msg, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `visible ${type}`;
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function showPreview() {
            setLoading('btn-preview', true);
            document.getElementById('btn-download').style.display = 'none';
            document.getElementById('preview-container').style.display = 'none';
            setStatus('⏳ Генерация карты...', 'info');
            currentToken = null;

            try {
                const payload = {
                    w: +document.getElementById('w').value,
                    h: +document.getElementById('h').value,
                    cp: +document.getElementById('cp').value,
                    format: document.getElementById('format').value
                };
                const res = await fetch('/preview', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('preview-img').src = data.image;
                    document.getElementById('preview-container').style.display = 'block';
                    document.getElementById('btn-download').style.display = 'flex';
                    currentToken = data.token;
                    setStatus('✅ Карта готова к просмотру', 'success');
                } else {
                    setStatus('❌ ' + (data.error || 'Ошибка генерации'), 'error');
                }
            } catch (e) {
                setStatus('❌ Ошибка соединения', 'error');
            } finally {
                setLoading('btn-preview', false);
            }
        }

       async function downloadZip() {
    if (!currentToken) { 
        setStatus('❌ Сначала создайте предпросмотр', 'error'); 
        return; 
    }
    
    setLoading('btn-download', true); 
    setStatus('⏳ Подготовка архива...', 'info');

    try {
        const payload = {
            w: +document.getElementById('w').value,
            h: +document.getElementById('h').value,
            cp: +document.getElementById('cp').value,
            courses: +document.getElementById('courses').value,
            format: document.getElementById('format').value,
            token: currentToken
        };
        
        const res = await fetch('/generate', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload) 
        });
        
        if (!res.ok) throw new Error(res.statusText);

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const filename = `Maze_${document.getElementById('format').value}_${payload.w}x${payload.h}.zip`;
        
        // 📱 ПРОСТОЕ РЕШЕНИЕ: открываем в новой вкладке
        // Это работает на ВСЕХ устройствах
        const newWindow = window.open(url, '_blank');
        
        if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            // Если popup заблокирован — создаем ссылку
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Для iOS
            setTimeout(() => {
                window.location.href = url;
            }, 100);
        }
        
        setStatus('✅ Скачивание началось! Если нет — проверьте всплывающие окна', 'success');
        
        // Очищаем через 5 минут
        setTimeout(() => {
            window.URL.revokeObjectURL(url);
        }, 300000);
        
    } catch (e) {
        console.error('Download error:', e);
        setStatus('❌ Ошибка. Откройте сайт в Safari/Chrome', 'error');
    } finally {
        setLoading('btn-download', false);
    }
}
    </script>

</body>
</html>
